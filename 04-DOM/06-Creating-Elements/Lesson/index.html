<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creating, Inserting & Removing Elements</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 30px;
    }

    section {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
    }

    h2 {
      margin-bottom: 15px;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
      margin: 5px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    ul {
      margin-top: 15px;
      padding-left: 20px;
    }

    li {
      margin: 8px 0;
    }

    .box-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
      min-height: 70px;
      border: 2px dashed #bbb;
      padding: 15px;
    }

    .box {
      width: 80px;
      height: 80px;
      background: steelblue;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: bold;
    }

    .card-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .card {
      width: 220px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      background: white;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card p {
      margin-bottom: 10px;
    }

    .highlight {
      background: gold;
    }
  </style>
</head>

<body>

  <h1>Chapter 6 Playground</h1>

  <!-- Shopping List -->

  <section>

    <h2>Shopping List</h2>

    <ul id="shopping-list">
      <li>Milk</li>
      <li id="bread">Bread</li>
    </ul>

  </section>

  <!-- Buttons -->

  <section>

    <h2>Buttons</h2>

    <button id="btn-1">Button 1</button>
    <button id="btn-2">Button 2</button>

  </section>

  <!-- Input -->

  <section>

    <h2>Input</h2>

    <input
      type="text"
      id="task-input"
      placeholder="Enter task"
    >

    <button id="add-task">
      Add Task
    </button>

  </section>

  <!-- Todo List -->

  <section>

    <h2>Todo List</h2>

    <ul id="todo-list">

    </ul>

  </section>

  <!-- Boxes -->

  <section>

    <h2>Boxes</h2>

    <div class="box-container">

    </div>

  </section>

  <!-- Cards -->

  <section>

    <h2>Cards</h2>

    <div class="card-container">

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
