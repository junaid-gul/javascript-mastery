<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Traversal</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            margin-bottom: 35px;
            color: #555;
        }

        section {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        section h2 {
            margin-bottom: 15px;
        }

        .products {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
        }

        .price {
            margin: 10px 0;
            color: green;
            font-weight: bold;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        li {
            margin-bottom: 8px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        input {
            padding: 10px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: royalblue;
        }
    </style>
</head>

<body>

    <main class="container">

        <h1>DOM Traversal Practice</h1>

        <p class="subtitle">
            One HTML file for the entire chapter.
        </p>

        <!-- Products -->

        <section class="products-section">

            <h2>Products</h2>

            <div class="products">

                <article class="card" data-id="1">

                    <h3>Laptop</h3>

                    <p class="price">$999</p>

                    <button class="buy-btn">
                        Buy Now
                    </button>

                </article>

                <article class="card" data-id="2">

                    <h3>Phone</h3>

                    <p class="price">$699</p>

                    <button class="buy-btn">
                        Buy Now
                    </button>

                </article>

                <article class="card" data-id="3">

                    <h3>Headphones</h3>

                    <p class="price">$199</p>

                    <button class="buy-btn">
                        Buy Now
                    </button>

                </article>

            </div>

        </section>

        <!-- Todo List -->

        <section class="todo-section">

            <h2>Todo List</h2>

            <ul id="todo-list">

                <li>Learn HTML</li>

                <li>Learn CSS</li>

                <li>Learn JavaScript</li>

            </ul>

        </section>

        <!-- Contact Form -->

        <section class="contact-section">

            <h2>Contact Form</h2>

            <form id="contact-form">

                <input
                    type="text"
                    placeholder="Your Name"
                >

                <input
                    type="email"
                    placeholder="Your Email"
                >

                <button type="submit">
                    Send
                </button>

            </form>

        </section>

        <!-- Footer -->

        <footer>

            <h2>Useful Links</h2>

            <div class="footer-links">

                <a href="#">Home</a>

                <a href="#">About</a>

                <a href="#">Contact</a>

            </div>

        </footer>

    </main>

    <script src="script.js"></script>

</body>
</html>
